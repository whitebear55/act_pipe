# FR3 (Franka Research 3) Robot Configuration
# 7-DOF fixed-base arm
# FR3는 Dynamixel 서보가 아닌 Franka 자체 QDD 방식 모터이므로
# toddlerbot default.yml의 Dynamixel 항목과 별개로 관리합니다.

actuators:
    # MuJoCo position actuator 기반 시뮬레이션용 파라미터
    # custom_pd=False (arx/g1 방식과 동일하게 MuJoCo 내부 PD 사용)
    kp_ratio: 1.0
    kd_ratio: 1.0
    passive_active_ratio: 1.0
    gain_backdrive: 1.0

    # FR3 Joint 1~4: 고토크 대형 모터
    FR3_HIGH:
        damping: 0.21
        armature: 0.195
        frictionloss: 1.137
        tau_max: 87.0
        q_dot_max: 2.62
        tau_q_dot_max: 10.0
        q_dot_tau_max: 1.0
        tau_brake_max: 100.0
        kd_min: 1.0
        kt: 1.0

    # FR3 Joint 5~7: 소형 모터
    FR3_LOW:
        damping: 0.074
        armature: 0.074
        frictionloss: 0.763
        tau_max: 12.0
        q_dot_max: 5.26
        tau_q_dot_max: 2.0
        q_dot_tau_max: 1.0
        tau_brake_max: 15.0
        kd_min: 0.5
        kt: 1.0

motors:
    # FR3 7개 관절 - MuJoCo actuator 이름과 일치 (fr3.xml 기준)
    fr3_joint1:
        motor: FR3_HIGH
        group: arm
        zero_pos: 0
        home_pos: 0.0
        kp: 4500.0
        kd: 450.0
        ki: 0.0

    fr3_joint2:
        motor: FR3_HIGH
        group: arm
        zero_pos: 0
        home_pos: 0.0
        kp: 4500.0
        kd: 450.0
        ki: 0.0

    fr3_joint3:
        motor: FR3_HIGH
        group: arm
        zero_pos: 0
        home_pos: 0.0
        kp: 3500.0
        kd: 350.0
        ki: 0.0

    fr3_joint4:
        motor: FR3_HIGH
        group: arm
        zero_pos: 0
        home_pos: -1.5708
        kp: 3500.0
        kd: 350.0
        ki: 0.0

    fr3_joint5:
        motor: FR3_LOW
        group: arm
        zero_pos: 0
        home_pos: 0.0
        kp: 2000.0
        kd: 200.0
        ki: 0.0

    fr3_joint6:
        motor: FR3_LOW
        group: arm
        zero_pos: 0
        home_pos: 1.5708
        kp: 2000.0
        kd: 200.0
        ki: 0.0

    fr3_joint7:
        motor: FR3_LOW
        group: arm
        zero_pos: 0
        home_pos: -0.7854
        kp: 2000.0
        kd: 200.0
        ki: 0.0
